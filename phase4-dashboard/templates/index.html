<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDR Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; }
    header { padding: 20px 30px; border-bottom: 1px solid #1e2433; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.3rem; color: #fff; }
    header span { color: #94a3b8; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 20px; }
    .card { background: #1e2433; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; }
    .card h2 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat { font-size: 2.5rem; font-weight: 700; color: #60a5fa; }
    .stat-label { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    .full-width { grid-column: 1 / -1; }
    .half-width { grid-column: span 2; }
    #map { width: 100%; height: 400px; border-radius: 8px; border: none; }
    .aircraft-list { max-height: 300px; overflow-y: auto; }
    .aircraft-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d3748; font-size: 0.85rem; }
    .aircraft-row:last-child { border-bottom: none; }
    .flight-id { color: #60a5fa; font-weight: 600; width: 100px; }
    .alt { color: #94a3b8; width: 80px; }
    .speed { color: #94a3b8; width: 80px; }
    .status { color: #4ade80; font-size: 0.75rem; }
    .placeholder { display: flex; align-items: center; justify-content: center; height: 150px; border: 2px dashed #2d3748; border-radius: 8px; color: #475569; font-size: 0.9rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<header>
  <span>📡</span>
  <h1>SDR Radio Dashboard</h1>
  <span>— San Antonio, TX</span>
  <span style="margin-left:auto"><span class="dot"></span>Live</span>
</header>

<div class="grid">

  <div class="card">
    <h2>Aircraft Tracked</h2>
    <div class="stat" id="total">—</div>
    <div class="stat-label">in range right now</div>
  </div>

  <div class="card">
    <h2>With Position</h2>
    <div class="stat" id="with_pos">—</div>
    <div class="stat-label">GPS coordinates decoded</div>
  </div>

  <div class="card">
    <h2>Messages Decoded</h2>
    <div class="stat" id="messages">—</div>
    <div class="stat-label">total ADS-B packets</div>
  </div>

  <div class="card half-width">
    <h2>Live Aircraft Map</h2>
    <iframe id="map" src="http://localhost:8888/gmap.html"></iframe>
  </div>

  <div class="card">
    <h2>Aircraft List</h2>
    <div class="aircraft-list" id="aircraft-list">
      <div style="color:#475569;font-size:0.85rem">Loading...</div>
    </div>
  </div>

  <div class="card full-width">
    <h2>ISS SSTV Images</h2>
    <div class="placeholder">🛰️ Waiting for next ISS SSTV event — check ariss.org for schedule</div>
  </div>

</div>

<script>
  function updateStats() {
    fetch('/api/stats')
      .then(r => r.json())
      .then(data => {
        document.getElementById('total').textContent = data.total ?? '—';
        document.getElementById('with_pos').textContent = data.with_position ?? '—';
        document.getElementById('messages').textContent = data.messages?.toLocaleString() ?? '—';
      });
  }

  function updateAircraft() {
    fetch('/api/aircraft')
      .then(r => r.json())
      .then(data => {
        const list = document.getElementById('aircraft-list');
        const aircraft = data.aircraft || [];
        if (aircraft.length === 0) {
          list.innerHTML = '<div style="color:#475569;font-size:0.85rem">No aircraft in range</div>';
          return;
        }
        list.innerHTML = aircraft
          .filter(a => a.flight || a.hex)
          .map(a => `
            <div class="aircraft-row">
              <span class="flight-id">${(a.flight || a.hex).trim()}</span>
              <span class="alt">${a.alt_baro ? a.alt_baro.toLocaleString() + ' ft' : '—'}</span>
              <span class="speed">${a.gs ? Math.round(a.gs) + ' kts' : '—'}</span>
            </div>
          `).join('');
      });
  }

  updateStats();
  updateAircraft();
  setInterval(updateStats, 5000);
  setInterval(updateAircraft, 5000);
</script>

</body>
</html>
